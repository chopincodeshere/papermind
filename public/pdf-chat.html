<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/logo-minimal.svg">
    <link rel="apple-touch-icon" href="/assets/logo-minimal.svg">
    <title>PaperMind</title>
    <link rel="stylesheet" href="/styles/pdf-chat-vars.css">
    <link rel="stylesheet" href="/styles/pdf-chat.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle-row">
            <label class="theme-toggle" for="themeToggle">
                <input type="checkbox" id="themeToggle" aria-label="Toggle dark mode">
                <span class="theme-toggle-slider"></span>
                <span id="themeToggleLabel">Dark Mode</span>
            </label>
        </div>
        <div class="brand-header">
            <img src="/assets/logo-minimal.svg" alt="PaperMind logo" class="brand-logo">
            <h1>PaperMind</h1>
        </div>
        
        <div class="upload-section" id="uploadSection">
            <h2>Upload PDF</h2>
            <form id="uploadForm">
                <input type="file" id="pdfFile" accept=".pdf" required>
                <button type="submit" id="uploadButton">Upload</button>
                <span id="uploadLoading" class="loading hidden"></span>
            </form>
            <div class="status" id="uploadStatus"></div>
            <div class="preview hidden" id="pdfPreview">
                <div class="preview-title">Notebook Preview:</div>
                <div id="pdfPreviewContent"></div>
            </div>
        </div>
        
        <div class="chat-section hidden" id="chatSection">
            <h2>Chat with PDF</h2>
            <div class="chat-container" id="chatContainer"></div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Ask a question about the PDF...">
                <button id="sendButton">Send</button>
            </div>
            <button id="backButton" class="back-button">Upload Another PDF</button>
        </div>
    </div>

    <script>
        // Global variables
        let sessionId = '';
        let chatHistory = [];
        let uploadStatusPollInterval = null;
        let activeUploadId = '';

        // DOM elements
        const uploadForm = document.getElementById('uploadForm');
        const uploadButton = document.getElementById('uploadButton');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadSection = document.getElementById('uploadSection');
        const chatSection = document.getElementById('chatSection');
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const uploadLoading = document.getElementById('uploadLoading');
        const backButton = document.getElementById('backButton');
        const pdfPreview = document.getElementById('pdfPreview');
        const pdfPreviewContent = document.getElementById('pdfPreviewContent');
        const themeToggle = document.getElementById('themeToggle');
        const themeToggleLabel = document.getElementById('themeToggleLabel');
        let typingMessageElement = null;

        initializeTheme();

        // Event listeners
        uploadForm.addEventListener('submit', handleUpload);
        sendButton.addEventListener('click', sendMessage);
        backButton.addEventListener('click', resetToUpload);
        themeToggle.addEventListener('change', () => {
            const theme = themeToggle.checked ? 'dark' : 'light';
            applyTheme(theme);
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function initializeTheme() {
            const storedTheme = localStorage.getItem('papermind-theme');
            const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initialTheme = storedTheme || (prefersDarkMode ? 'dark' : 'light');
            applyTheme(initialTheme, false);
        }

        function applyTheme(theme, persist = true) {
            const isDark = theme === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeToggle.checked = isDark;
            themeToggleLabel.textContent = isDark ? 'Light Mode' : 'Dark Mode';
            if (persist) {
                localStorage.setItem('papermind-theme', isDark ? 'dark' : 'light');
            }
        }

        // Reset to upload screen
        function resetToUpload() {
            stopUploadStatusPolling();
            lastUploadSteps = [];
            chatSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            uploadStatus.textContent = '';
            uploadStatus.className = 'status';
            chatContainer.innerHTML = '';
            messageInput.value = '';
            sessionId = '';
            chatHistory = [];
            uploadLoading.classList.add('hidden');
            uploadButton.disabled = false;
            sendButton.disabled = false;
            document.getElementById('pdfFile').value = '';
            pdfPreview.classList.add('hidden');
        }

        // Handle PDF upload
        async function handleUpload(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];
            
            if (!file) {
                setUploadStatus('Please select a PDF file', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('pdf', file);
            activeUploadId = `upload-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            lastUploadSteps = [];
            
            setUploadStatus('Starting upload...', '');
            uploadLoading.classList.remove('hidden');
            uploadButton.disabled = true;
            startUploadStatusPolling(activeUploadId);
            
            try {
                const response = await fetch('/pdf/upload', {
                    method: 'POST',
                    headers: {
                        'x-upload-id': activeUploadId
                    },
                    body: formData
                });
                
                const data = await response.json();
                const statusUploadId = data.uploadId || activeUploadId;
                await refreshUploadStatus(statusUploadId);
                
                if (response.ok) {
                    setUploadStatus(renderUploadSteps([
                        ...(getLastKnownSteps() || []),
                        data.message || 'PDF uploaded and processed successfully!'
                    ]), 'success');
                    sessionId = data.sessionId; // Store the session ID for later use
                    
                    // Show PDF preview if available
                    if (data.text) {
                        pdfPreviewContent.textContent = data.text;
                        pdfPreview.classList.remove('hidden');
                    }
                    
                    // Show chat section
                    uploadSection.classList.add('hidden');
                    chatSection.classList.remove('hidden');
                    
                    // Add welcome message
                    addBotMessage('Your PDF is ready. Ask a question and I will write the summary on notebook lines.');
                } else {
                    setUploadStatus(`Error: ${data.message || 'Failed to process PDF'}`, 'error');
                    if (data.error) {
                        console.error('Upload error details:', data.error);
                    }
                }
            } catch (error) {
                setUploadStatus(`Error: ${error.message}`, 'error');
                console.error('Upload error:', error);
            } finally {
                stopUploadStatusPolling();
                uploadLoading.classList.add('hidden');
                uploadButton.disabled = false;
            }
        }

        // Set upload status with appropriate styling
        function setUploadStatus(message, type) {
            uploadStatus.textContent = message;
            uploadStatus.className = 'status';
            uploadStatus.style.whiteSpace = 'pre-line';
            if (type) {
                uploadStatus.classList.add(type);
            }
        }

        let lastUploadSteps = [];

        function getLastKnownSteps() {
            return lastUploadSteps;
        }

        function renderUploadSteps(steps) {
            return steps.map((step, index) => `${index + 1}. ${step}`).join('\n');
        }

        function startUploadStatusPolling(uploadId) {
            stopUploadStatusPolling();
            refreshUploadStatus(uploadId);
            uploadStatusPollInterval = setInterval(() => {
                refreshUploadStatus(uploadId);
            }, 700);
        }

        function stopUploadStatusPolling() {
            if (uploadStatusPollInterval) {
                clearInterval(uploadStatusPollInterval);
                uploadStatusPollInterval = null;
            }
            activeUploadId = '';
        }

        async function refreshUploadStatus(uploadId) {
            if (!uploadId) return;
            try {
                const response = await fetch(`/pdf/upload-status/${encodeURIComponent(uploadId)}`);
                if (!response.ok) return;
                const data = await response.json();
                if (Array.isArray(data.steps) && data.steps.length > 0) {
                    lastUploadSteps = data.steps;
                    setUploadStatus(renderUploadSteps(data.steps), data.error ? 'error' : '');
                }
                if (data.done) {
                    stopUploadStatusPolling();
                }
            } catch (error) {
                console.error('Upload status polling error:', error);
            }
        }

        // Send message to chat
        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addUserMessage(message);
            messageInput.value = '';
            sendButton.disabled = true;
            showBotTypingIndicator();
            
            try {
                const response = await fetch('/pdf/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message,
                        sessionId,
                        history: chatHistory
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Add bot response to chat
                    addBotMessage(data.data.result.response);
                    
                    // Update chat history
                    chatHistory = data.data.result.history;
                } else {
                    const errorMsg = data.message || 'Failed to get response';
                    addBotMessage(`Error: ${errorMsg}`);
                    
                    // If session expired or file not found, show upload again
                    if (errorMsg.includes('session') || errorMsg.includes('PDF not found') || errorMsg.includes('file no longer exists')) {
                        setTimeout(() => {
                            addBotMessage('Please upload your PDF again to continue chatting.');
                            setTimeout(resetToUpload, 2000);
                        }, 1000);
                    }
                }
            } catch (error) {
                addBotMessage(`Error: ${error.message}`);
                console.error('Chat error:', error);
            } finally {
                removeBotTypingIndicator();
                sendButton.disabled = false;
            }
        }

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function formatMessageContent(text) {
            const escaped = escapeHtml(text);
            const lines = escaped.split('\n');
            const parts = [];
            let inList = false;

            for (const line of lines) {
                const bulletMatch = line.match(/^\s*[*-]\s+(.*)$/);
                if (bulletMatch) {
                    if (!inList) {
                        parts.push('<ul>');
                        inList = true;
                    }
                    parts.push(`<li>${bulletMatch[1]}</li>`);
                    continue;
                }

                if (inList) {
                    parts.push('</ul>');
                    inList = false;
                }

                if (line.trim() === '') {
                    parts.push('<br>');
                } else {
                    parts.push(`<p>${line}</p>`);
                }
            }

            if (inList) {
                parts.push('</ul>');
            }

            return parts
                .join('')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>');
        }

        // Add user message to chat
        function addUserMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'user-message');
            messageElement.innerHTML = `<div class="message-content">${formatMessageContent(message)}</div>`;
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Add bot message to chat
        function addBotMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'bot-message');
            messageElement.innerHTML = `<div class="message-content">${formatMessageContent(message)}</div>`;
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showBotTypingIndicator() {
            removeBotTypingIndicator();
            typingMessageElement = document.createElement('div');
            typingMessageElement.classList.add('message', 'bot-message', 'typing-message');
            typingMessageElement.innerHTML = `
                <div class="message-content">
                    <span class="typing-dots" aria-label="Paper Mind is typing" role="status">
                        <span></span><span></span><span></span>
                    </span>
                </div>
            `;
            chatContainer.appendChild(typingMessageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeBotTypingIndicator() {
            if (typingMessageElement) {
                typingMessageElement.remove();
                typingMessageElement = null;
            }
        }
    </script>
</body>
</html>
